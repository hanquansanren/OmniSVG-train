# FSDP Configuration - Sharded State Dict (快速保存版本)
# 使用分片保存策略，避免checkpoint保存时的NCCL超时

compute_environment: LOCAL_MACHINE
distributed_type: FSDP

fsdp_config:
  # 使用 SIZE_BASED_WRAP，让 vision / embedding / lm_head 等大模块也被单独分片。
  # TRANSFORMER_BASED_WRAP 只包 decoder layer，root module 仍可能过大，FSDP 初始化时会 OOM。
  fsdp_auto_wrap_policy: SIZE_BASED_WRAP
  fsdp_min_num_params: 100000
  
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_forward_prefetch: false
  
  # ⭐ 关键区别：使用SHARDED_STATE_DICT而不是FULL_STATE_DICT
  # SHARDED_STATE_DICT: 每个GPU只保存自己的分片，避免gather所有参数
  # 优点：保存速度快，不会NCCL超时
  # 缺点：加载时需要用FSDP，不能直接用普通方式加载
  fsdp_state_dict_type: SHARDED_STATE_DICT
  
  # 每个 rank 都会从同一个 checkpoint 加载权重，不需要 rank0 再把完整参数广播一次。
  # 关闭它可以降低 FSDP 初始化时 rank0 的显存峰值。
  fsdp_sync_module_states: false
  # 降低 FSDP 初始化/flatten 时的原始参数保留开销。
  fsdp_use_orig_params: false
  # Accelerate 要求 cpu_ram_efficient_loading=true 时 sync_module_states 也必须为 true。
  # train2 每个 rank 独立加载同一份权重，所以这里关闭 CPU RAM efficient loading。
  fsdp_cpu_ram_efficient_loading: false
  fsdp_offload_params: true
  
  # FSDP原生的Activation Checkpointing
  fsdp_activation_checkpointing: true

mixed_precision: bf16
downcast_bf16: 'no'
num_processes: 4
gpu_ids: all
use_cpu: false
num_machines: 1
machine_rank: 0
main_process_ip: null
main_process_port: null
main_training_function: main
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false

# ==============================================================================
# 说明
# ==============================================================================
# 
# FULL_STATE_DICT vs SHARDED_STATE_DICT:
# 
# FULL_STATE_DICT (fsdp_config_transformer.yaml):
# - 保存：在主进程gather所有参数，保存完整模型
# - 优点：兼容性好，可以在任何环境加载
# - 缺点：保存慢，可能NCCL超时（尤其是大模型）
# 
# SHARDED_STATE_DICT (此配置):
# - 保存：每个GPU保存自己的分片，无需gather
# - 优点：保存快，避免NCCL超时
# - 缺点：加载时需要FSDP环境，checkpoint体积是GPU数量倍
# 
# 推荐使用场景：
# - 训练过程中频繁保存 → SHARDED_STATE_DICT (此配置)
# - 最终模型保存 → FULL_STATE_DICT (手动转换)
# 
# ==============================================================================
